<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demonstração de Vitrine — Universo Refrigeração</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0B4DA4">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --azul:        #0B4DA4;
      --azul-medio:  #1565C0;
      --azul-claro:  #42A5F5;
      --azul-palido: #E3F2FD;
      --azul-bg:     #F0F7FF;
      --branco:      #FFFFFF;
      --texto:       #1A2744;
      --texto-leve:  #64748B;
      --borda:       #D0DCF0;
      --header-h:    80px;
      --badge-h:     63px;
      --ff-titulo:   'Poppins', sans-serif;
      --ff-corpo:    'Inter', sans-serif;
      --tr:          0.3s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      width: 100%; height: 100%;
      overflow: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    html::-webkit-scrollbar { display: none; }

    body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: var(--ff-corpo);
    }

    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }

    .container {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* ══════════════════════════════════
       HEADER
    ══════════════════════════════════ */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      height: var(--header-h);
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--borda);
      box-shadow: 0 2px 16px rgba(11,77,164,0.08);
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
    }
    .logo-img {
      height: 48px;
      width: auto;
      display: block;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .nav-links a {
      font-family: var(--ff-titulo);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--texto-leve);
      padding: 0.5rem 0.85rem;
      border-radius: 8px;
      transition: color var(--tr), background var(--tr);
    }
    .nav-links a:hover { color: var(--azul); background: var(--azul-palido); }
    .nav-links a.active-page { color: var(--azul); background: var(--azul-palido); }
    .nav-cta {
      background: var(--azul) !important;
      color: var(--branco) !important;
      font-weight: 600 !important;
      padding: 0.5rem 1.3rem !important;
      border-radius: 8px;
    }
    .nav-cta:hover { background: var(--azul-medio) !important; color: var(--branco) !important; }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--texto);
      border-radius: 2px;
      transition: all var(--tr);
    }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

    /* NAV MOBILE */
    #navMenu {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(12px);
      z-index: 999;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.3s ease;
      border-bottom: 1px solid var(--borda);
    }
    #navMenu.open { max-height: 480px; padding: 20px 0 28px; }
    #navMenu a {
      display: block;
      font-family: var(--ff-titulo);
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--texto-leve);
      padding: 14px 24px;
      border-bottom: 1px solid var(--borda);
      transition: color var(--tr), background var(--tr);
    }
    #navMenu a:hover { color: var(--azul); background: var(--azul-bg); }
    #navMenu .nav-cta {
      display: block;
      margin: 16px 24px 0;
      text-align: center;
      border-radius: 8px;
      background: var(--azul) !important;
      color: var(--branco) !important;
      padding: 14px 24px !important;
    }

    /* ══════════════════════════════════
       IFRAME
    ══════════════════════════════════ */
    #vitrine-wrapper {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      bottom: var(--badge-h);
      width: 100%;
    }
    #vitrine-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ══════════════════════════════════
       BADGE INFERIOR
    ══════════════════════════════════ */
    #vitrine-badge {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--badge-h);
      background: linear-gradient(135deg, var(--azul) 0%, var(--azul-medio) 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      z-index: 1000;
      border-top: 2px solid var(--azul-claro);
      gap: 12px;
    }
    .badge-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--ff-titulo);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--branco);
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 8px;
      padding: 0.45rem 1.1rem;
      white-space: nowrap;
      transition: background var(--tr);
    }
    .badge-back:hover { background: rgba(255,255,255,0.2); }

    .badge-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      justify-content: center;
    }
    .badge-brand-icon {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: var(--azul-claro);
    }
    .badge-brand span {
      font-family: var(--ff-titulo);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
    }
    .badge-wa {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--ff-titulo);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--branco);
      background: #25D366;
      border: 1px solid #25D366;
      border-radius: 8px;
      padding: 0.45rem 1.1rem;
      white-space: nowrap;
      transition: background var(--tr);
    }
    .badge-wa:hover { background: #1da851; border-color: #1da851; }

    /* ══════════════════════════════════
       RESPONSIVIDADE
    ══════════════════════════════════ */
    @media (max-width: 1023px) {
      nav .nav-links { display: none; }
      .hamburger { display: flex; }
    }
    @media (max-width: 767px) {
      :root { --header-h: 66px; }
      .logo-img { height: 42px; }
      .badge-brand span { display: none; }
      .badge-brand-icon { width: 28px; height: 28px; font-size: 0.8rem; }
    }
    @media (max-width: 599px) {
      #vitrine-badge { padding: 0 1rem; }
      .badge-back { padding: 0.4rem 0.85rem; font-size: 0.68rem; }
      .badge-wa   { padding: 0.4rem 0.85rem; font-size: 0.68rem; }
    }
    @media (max-width: 479px) {
      :root { --header-h: 60px; }
      .logo-img { height: 36px; }
      .badge-brand { display: none; }
    }
  </style>
</head>
<body>

  <!-- ══════ HEADER ══════ -->
  <header id="header">
    <div class="container header-inner">
      <a href="index.html" class="logo-wrap" aria-label="Universo Refrigeração — início">
        <img src="images/favicon.png" alt="Universo Refrigeração" class="logo-img">
      </a>
      <nav class="nav-links" aria-label="Navegação principal">
        <a href="index.html#sobre">Sobre</a>
        <a href="index.html#servicos">Serviços</a>
        <a href="index.html#mvv">Missão</a>
        <a href="vitrine.html" class="active-page">Vitrine</a>
        <a href="index.html#contato">Contato</a>
        <a href="https://wa.me/55XXXXXXXXXXX" target="_blank" rel="noopener noreferrer" class="nav-cta">
          <i class="fa-brands fa-whatsapp"></i> WhatsApp
        </a>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- NAV MOBILE -->
  <nav id="navMenu" aria-label="Menu mobile">
    <a href="index.html#sobre">Sobre</a>
    <a href="index.html#servicos">Serviços</a>
    <a href="index.html#mvv">Missão</a>
    <a href="vitrine.html" style="color:var(--azul)">Vitrine</a>
    <a href="index.html#contato">Contato</a>
    <a href="https://wa.me/55XXXXXXXXXXX" target="_blank" rel="noopener noreferrer" class="nav-cta">
      <i class="fa-brands fa-whatsapp"></i> Falar no WhatsApp
    </a>
  </nav>

  <!-- ══════ IFRAME VITRINE ══════ -->
  <div id="vitrine-wrapper">
    <iframe
      id="vitrine-frame"
      src="https://universorefrigeracao.egestor.com.br/vitrine"
      title="Vitrine Universo Refrigeração"
      allow="payment"
      loading="eager">
    </iframe>
  </div>

  <!-- ══════ BADGE INFERIOR ══════ -->
  <div id="vitrine-badge">
    <a href="index.html" class="badge-back">
      <i class="fa-solid fa-arrow-left"></i> Voltar ao site
    </a>
    <div class="badge-brand">
      <div class="badge-brand-icon"><i class="fa-solid fa-snowflake"></i></div>
      <span>Vitrine Oficial</span>
    </div>
    <a href="https://wa.me/55XXXXXXXXXXX" target="_blank" rel="noopener noreferrer" class="badge-wa">
      <i class="fa-brands fa-whatsapp"></i> WhatsApp
    </a>
  </div>

  <script>
    /* ── HAMBURGER ── */
    const hamburger = document.getElementById('hamburger');
    const navMenu   = document.getElementById('navMenu');
    hamburger.addEventListener('click', () => {
      const open = navMenu.classList.toggle('open');
      hamburger.classList.toggle('open', open);
      hamburger.setAttribute('aria-expanded', open);
    });
    navMenu.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        navMenu.classList.remove('open');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
      });
    });

    /* ── AJUSTE DINÂMICO DO IFRAME ── */
    function adjustIframe() {
      const header = document.getElementById('header');
      const hH = header ? header.offsetHeight : 80;
      const bH = 63;
      document.getElementById('vitrine-frame').style.height =
        (window.innerHeight - hH - bH) + 'px';
    }
    window.addEventListener('resize', adjustIframe);
    adjustIframe();
  </script>
</body>
</html>
